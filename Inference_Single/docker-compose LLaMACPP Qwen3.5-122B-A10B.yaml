name: llama_cpp_qwen3_5_122b_a10b_q4_k_m

networks:
  server:
    driver: bridge

services:
  llama_cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: LlamaCpp_Qwen3_5_122B_A10B_Q4_K_M
    networks:
      - server
    ports:
      - "8000:8080"
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
      nofile:
        soft: 1048576
        hard: 1048576
    gpus: all
    privileged: true
    env_file:
      - ../.env
    environment:
      # llama.cpp model cache (persistent on host)
      - LLAMA_CACHE=/root/.cache/huggingface/llama.cpp
    volumes:
      # reuse your existing host cache root
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface

    command:
      - --model
      - /root/.cache/huggingface/hub/models--unsloth--Qwen3.5-122B-A10B-GGUF/snapshots/51eab4d59d53f573fb9206cb3ce613f1d0aa392b/Q4_K_M/Qwen3.5-122B-A10B-Q4_K_M-00001-of-00003.gguf
      - --mmproj
      - /root/.cache/huggingface/hub/models--unsloth--Qwen3.5-122B-A10B-GGUF/snapshots/51eab4d59d53f573fb9206cb3ce613f1d0aa392b/mmproj-F16.gguf
      - --alias
      - qwen35-122b-a10b-q4_k_m
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      # GPU offload
      - --n-gpu-layers
      - "all"
      - --ctx-size
      - "262144"
